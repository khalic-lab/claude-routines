title: "Khalic Lab — News"
description: "News briefs generated by automated routines: daily news, AI/ML, science, weekend deep read, weekly evaluator."
url: "https://khalic-lab.github.io"
baseurl: "/claude-routines"

remote_theme: "mmistakes/minimal-mistakes@4.26.2"
minimal_mistakes_skin: "default"  # light base; the old-journal paper/serif look is layered in _includes/head/custom.html

permalink: /:year/:month/:day/:title/
timezone: Europe/Zurich

plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-paginate
  - jekyll-include-cache

paginate: 20
paginate_path: /page:num/

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: false
      read_time: true
      comments: false
      share: false
      related: false
      show_date: true

category_archive:
  type: liquid
  path: /categories/
tag_archive:
  type: liquid
  path: /tags/

exclude:
  - briefs           # legacy pre-Pages layout (deleted 2026-07-03); guard should it reappear
  - bridge.sh
  - HANDOFF.md
  - ARCHITECTURE.md
  - CLAUDE.md          # agent ops manual — trigger IDs, env, bridge paths; internal, never published
  - Gemfile
  - Gemfile.lock
  - vendor
  - node_modules
  - watches.yml
  - pending-notifications
  - tools
  - index/stories  # dedup data dir; NOT bare "index" — that prefix-matches index.md and kills the homepage
  - index/ledger   # story-store event ledger (2026-07-07); same bare-"index" caveat as above
  - sources        # source registry + credibility lifecycle; writer/Evaluator-read, never published
  - feedback           # reader-feedback data + FEEDBACK.md (writer/Evaluator-read, never published)
  - proposals          # brief proposals drained from the site form; reviewed, never published
  - reader-profile.md  # editorial brief the writers read at compose time; not a page
  - reader-profile     # source-weights.yml; writer-read, not published
  - routines           # snapshots of the claude.ai RemoteTrigger prompts; private editorial config, never published
  - diagrams           # mermaid architecture diagrams; reference env/trigger IDs + Worker URLs, never published
  - docs               # design proposals (SPIKE-*) + dated archive (AUDIT/REVIEW/PRIOR-ART/DEDUP-DIAGNOSIS); internal
  - "*.gemspec"
  - README.md
