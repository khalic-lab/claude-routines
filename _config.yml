title: "Khalic Lab — News"
description: "Daily news briefs generated by automated routines: morning overview, AI/ML, cybersecurity + papers, weekend deep read, weekly review."
url: "https://khalic-lab.github.io"
baseurl: "/claude-routines"

remote_theme: "mmistakes/minimal-mistakes@4.26.2"
minimal_mistakes_skin: "dark"

permalink: /:year/:month/:day/:title/
timezone: Europe/Zurich

plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-paginate
  - jekyll-include-cache

paginate: 20
paginate_path: /page:num/

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: false
      read_time: true
      comments: false
      share: false
      related: false
      show_date: true

category_archive:
  type: liquid
  path: /categories/
tag_archive:
  type: liquid
  path: /tags/

exclude:
  - bridge.sh
  - HANDOFF.md
  - ARCHITECTURE.md
  - Gemfile
  - Gemfile.lock
  - vendor
  - node_modules
  - watches.yml
  - pending-notifications
  - tools
  - index/stories  # dedup data dir; NOT bare "index" — that prefix-matches index.md and kills the homepage
  - feedback           # reader-feedback data + FEEDBACK.md (writer/Evaluator-read, never published)
  - reader-profile.md  # editorial brief the writers read at compose time; not a page
  - reader-profile     # source-weights.yml; writer-read, not published
  - "*.gemspec"
  - README.md
