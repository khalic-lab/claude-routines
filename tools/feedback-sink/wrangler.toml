name = "feedback-sink"
main = "src/worker.js"
compatibility_date = "2025-05-01"

# KV holding pen for feedback records between /submit (browser) and /drain (bridge).
# Create it once and paste the printed id here:
#   wrangler kv namespace create FEEDBACK_KV
[[kv_namespaces]]
binding = "FEEDBACK_KV"
id = "005fab1cb5f842cb91a6dce43c973bfd"

[observability]
enabled = true
