name = "embed-proxy"
main = "src/worker.js"
compatibility_date = "2025-05-01"

# Workers AI binding — gives the worker env.AI.run(...) for embeddings.
[ai]
binding = "AI"

# KV holding the baked analytical-plane artifact (tools/plane/bake.py --push -> /plane/ingest).
# Created 2026-07-18: wrangler kv namespace create PLANE_KV
[[kv_namespaces]]
binding = "PLANE_KV"
id = "459b76a22a0b4231a64e0baad0372d49"

[observability]
enabled = true
