<style>
  /* arXiv PDF chip — inline pill. (The thumbnail-wrapper rules that used to lead this block were
     dead — fully superseded by the editorial figure block lower down — so they were removed; their
     two surviving declarations, border-radius + object-fit, were folded into that block.) */
  a.auto-preview.pdf {
    display: inline-block;
    font-size: 0.7em;
    font-weight: 700;
    line-height: 1;
    color: #fff;
    background: var(--accent-chip);
    padding: 3px 5px;
    border-radius: 3px;
    text-decoration: none;
    margin: 0 0.4em;
    vertical-align: middle;
  }
  a.auto-preview.pdf:hover { background: var(--accent-chip-hover); }
</style>
<script>
// Shared helpers (used by the story-tagger below AND the feedback IIFE further down): find the
// Coverage-footer heading, and test whether a node sits after it (meta/Gaps content, not a story).
function findCoverageFooter(content) {
  var footer = null;
  content.querySelectorAll('h1,h2,h3,h4').forEach(function (h) {
    if (!footer && /coverage footer/i.test(h.textContent || '')) footer = h;
  });
  return footer;
}
function afterFooter(footer, el) {
  return !!(footer && (footer.compareDocumentPosition(el) & Node.DOCUMENT_POSITION_FOLLOWING));
}

// Workaround for minimal-mistakes assuming .page__content always exists.
// Theme's main.min.js does `document.querySelector(".page__content").querySelectorAll(...)`
// which throws on layouts without that wrapper (e.g. layout: home). Stub it in.
document.addEventListener('DOMContentLoaded', function () {
  if (!document.querySelector('.page__content')) {
    var stub = document.createElement('div');
    stub.className = 'page__content';
    stub.style.display = 'none';
    document.body.appendChild(stub);
  }
}, { once: true });

// Normalize the story list and tag real story bullets with `.story` so the editorial CSS
// targets ONLY stories (not the Coverage-footer / "Gaps:" list, which must render as plain
// prose). Two things happen here:
//   1. TIGHT lists: kramdown emits <li><strong>…</strong> text…  (no <p>) when story bullets
//      aren't blank-separated; .page__content > ul > li.story{display:flex;flex-direction:column}
//      would drop every inline run (each <strong>/<em>/text node) onto its own line, and the
//      `> p` headline rule can't match. So wrap each tight story's inline run in a generated
//      <p class="story-body">, BEFORE the figure wrap and any nested <ul>/<ol> so the
//      figure (order:2) + sub-bullets (order:3) ordering is preserved.
//   2. LOOSE story bullets already have a <p>; just tag them.
// Either way the <li> gets `.story`; footer/non-story bullets get nothing → they fall out of
// the flex/headline rules and render as ordinary prose (no fragmentation, no false headline).
// Runs before the figure observer + feedback pass (registration order) so they see the result.
document.addEventListener('DOMContentLoaded', function () {
  var content = document.querySelector('.page__content');
  if (!content) return;
  // Stop at the Coverage footer — bullets after it are meta/Gaps, not stories.
  var footer = findCoverageFooter(content);
  content.querySelectorAll(':scope > ul > li').forEach(function (li) {
    if (afterFooter(footer, li)) return;
    // Resolve the lead element: skip leading whitespace and any (async) figure wrap.
    var lead = li.firstChild;
    while (lead && (
      (lead.nodeType === 3 && !lead.nodeValue.trim()) ||
      (lead.nodeType === 1 && lead.classList && lead.classList.contains('auto-preview-wrap'))
    )) lead = lead.nextSibling;
    if (!lead || lead.nodeType !== 1) return;

    if (lead.tagName === 'P') {
      // Already loose: a story iff its <p> leads with <strong>. A leading text run
      // (e.g. "Gaps: ") means it's not a story — leave it untagged.
      var pLead = lead.firstChild;
      while (pLead && pLead.nodeType === 3 && !pLead.nodeValue.trim()) pLead = pLead.nextSibling;
      if (pLead && pLead.nodeType === 1 && pLead.tagName === 'STRONG') li.classList.add('story');
      return;
    }
    if (lead.tagName !== 'STRONG') return;   // tight non-story bullet → leave as plain prose

    // Tight story: wrap the inline run in a <p>, before the figure wrap and any sub-list.
    var p = document.createElement('p');
    p.className = 'story-body';
    var node = li.firstChild;
    while (node) {
      var next = node.nextSibling;
      var isBlock = node.nodeType === 1 && (
        (node.classList && node.classList.contains('auto-preview-wrap')) ||
        node.tagName === 'UL' || node.tagName === 'OL');
      if (!isBlock) p.appendChild(node);   // move the inline run into the <p>
      node = next;
    }
    var sub = li.querySelector(':scope > ul, :scope > ol');
    li.insertBefore(p, sub || null);       // <p> before any nested sub-list
    li.classList.add('story');
  });
});
</script>
<script>
(function () {
  if (typeof window === 'undefined' || !window.fetch || !('IntersectionObserver' in window)) return;
  // sessionStorage key prefix; bump suffix to force-invalidate prior entries
  // when the unfurl backend or response shape changes.
  var CACHE = 'autoPreview:v2:';
  var favicon = function (url) {
    try {
      var h = new URL(url).hostname;
      return 'https://www.google.com/s2/favicons?domain=' + h + '&sz=64';
    } catch (e) { return null; }
  };
  var unfurl = function (url) {
    return fetch('https://og-proxy.khalic-lab.workers.dev/?url=' + encodeURIComponent(url))
      .then(function (r) { return r.ok ? r.json() : null; })
      .then(function (j) { return j && j.image ? j.image : null; })
      .catch(function () { return null; });
  };
  // Real article thumbnails float right of the containing bullet/paragraph,
  // one per container. Favicons stay inline after the link as small badges.
  var IMAGED = '__autoPreviewImaged';
  var bulletContainer = function (el) {
    return el.closest('li') || el.closest('p') || el.parentNode;
  };
  var render = function (link, src, isFavicon) {
    if (!src) return;
    var img = document.createElement('img');
    img.className = 'auto-preview' + (isFavicon ? ' fav' : '');
    img.loading = 'lazy';
    img.referrerPolicy = 'no-referrer';
    img.src = src;
    img.alt = '';
    if (isFavicon) {
      link.parentNode.insertBefore(img, link.nextSibling);
      return;
    }
    var bullet = bulletContainer(link);
    if (!bullet || bullet[IMAGED]) return; // one image per bullet
    bullet[IMAGED] = true;
    var wrap = document.createElement('a');
    wrap.className = 'auto-preview-wrap';
    wrap.href = src;
    wrap.target = '_blank';
    wrap.rel = 'noopener noreferrer';
    wrap.appendChild(img);
    wrap.setAttribute('aria-hidden', 'true');   // decorative: opens the raw og:image, keep out of the tab order
    wrap.setAttribute('tabindex', '-1');
    bullet.insertBefore(wrap, bullet.firstChild);
  };
  // arxiv.org sets the same logo as og:image for every paper. The og-proxy
  // returns nothing useful, so skip the unfurl and render a small "PDF" chip
  // linking directly to the paper PDF instead.
  var ARXIV_HOSTS = { 'arxiv.org': 1, 'www.arxiv.org': 1, 'export.arxiv.org': 1 };
  var ARXIV_PATH = /^\/(?:abs|pdf|html)\/([\w.-]+?)(?:v\d+)?(?:\.pdf)?\/?$/;
  var arxivPdfUrl = function (link) {
    if (!ARXIV_HOSTS[link.hostname]) return null;
    var m = link.pathname.match(ARXIV_PATH);
    return m ? 'https://arxiv.org/pdf/' + m[1] + '.pdf' : null;
  };
  var renderPdfChip = function (link, pdfHref) {
    var a = document.createElement('a');
    a.className = 'auto-preview pdf';
    a.href = pdfHref;
    a.target = '_blank';
    a.rel = 'noopener';
    a.textContent = 'PDF';
    link.parentNode.insertBefore(a, link.nextSibling);
  };
  var attach = function (link) {
    if (link.dataset.previewed) return;
    link.dataset.previewed = '1';
    var pdf = arxivPdfUrl(link);
    if (pdf) { renderPdfChip(link, pdf); return; }
    var href = link.href;
    var cached = sessionStorage.getItem(CACHE + href);
    if (cached !== null) {
      if (cached) render(link, cached, cached.indexOf('s2/favicons') !== -1);
      return;
    }
    unfurl(href).then(function (src) {
      var fb = favicon(href);
      var final = src || fb;
      try { sessionStorage.setItem(CACHE + href, final || ''); } catch (e) {}
      render(link, final, !src && !!fb);
    });
  };
  document.addEventListener('DOMContentLoaded', function () {
    var content = document.querySelector('.page__content');
    if (!content) return;
    var io = new IntersectionObserver(function (entries) {
      entries.forEach(function (e) {
        if (e.isIntersecting) {
          attach(e.target);
          io.unobserve(e.target);
        }
      });
    }, { rootMargin: '300px 0px' });
    content.querySelectorAll('a[href^="http"], a[href^="//"]').forEach(function (l) {
      if (l.closest('.page__share') || l.closest('nav')) return;
      if (l.host === window.location.host) return;
      io.observe(l);
    });
  });
})();
</script>

{%- if page.date and page.categories -%}
<script>
  // Injected by Jekyll on post pages only: the brief's index slug, e.g.
  // "2026-06-07-overview". Matches the _posts filename + index/stories key, so per-story
  // feedback (v2) can key the same id the dedup index uses.
  window.__BRIEF = { slug: "{{ page.date | date: '%Y-%m-%d' }}-{{ page.categories | first }}" };
</script>
{%- endif -%}

<style>
  /* Feedback widgets — LAYOUT/TYPOGRAPHY only. All colors (borders/backgrounds/accents) live in
     the variable-driven block lower down so light/dark follow one source of truth. */
  /* bottom-of-brief OVERALL box (brief-level feedback, story_id == null) */
  .fb-box {
    margin: 2.5em 0 1em; padding: 0.9em 1.1em;
    border-radius: 8px; font-size: 0.85em;
  }
  .fb-box .fb-row { display: flex; align-items: center; gap: 0.6em; flex-wrap: wrap; }
  .fb-box .fb-q { opacity: 0.8; margin-right: 0.2em; }
  .fb-btn {
    cursor: pointer; background: transparent;
    color: inherit; border-radius: 6px; padding: 0.25em 0.6em; font-size: 1em; line-height: 1;
  }
  .fb-reason { display: none; width: 100%; margin-top: 0.6em; }
  .fb-reason textarea {
    width: 100%; box-sizing: border-box; min-height: 3em; resize: vertical;
    color: inherit; border-radius: 6px; padding: 0.4em 0.6em; font: inherit;
  }
  .fb-send { margin-top: 0.5em; }
  .fb-status { opacity: 0.75; margin-left: 0.3em; }

  /* per-STORY inline thumbs (story_id set) — faint until you hover OR keyboard-focus the bullet */
  .fb-inline {
    margin-left: 0.45em; white-space: nowrap; user-select: none;
    font-size: 0.92em; opacity: 0.45; transition: opacity 0.12s ease; vertical-align: baseline;
  }
  li:hover .fb-inline, li:focus-within .fb-inline, .fb-inline:focus-within,
  .fb-inline.fb-live { opacity: 0.95; }
  @media (hover: none) { .fb-inline { opacity: 0.7; } }            /* always visible on touch */
  @media (prefers-reduced-motion: reduce) { .fb-inline { transition: none; } }
  .fb-t {
    cursor: pointer; border: none; background: transparent; color: inherit;
    padding: 0 0.12em; font-size: 1em; line-height: 1; opacity: 0.85;
  }
  .fb-t:hover { opacity: 1; }
  .fb-t.fb-on { opacity: 1; }
  .fb-t.fb-off { opacity: 0.3; }
  .fb-ist { font-size: 0.8em; opacity: 0.7; margin-left: 0.3em; }
  .fb-irzn { display: none; gap: 0.4em; align-items: center; flex-wrap: wrap; margin: 0.4em 0 0.2em; }
  .fb-irzn input {
    flex: 1 1 180px; min-width: 0; box-sizing: border-box;
    color: inherit; border-radius: 6px; padding: 0.3em 0.5em; font: inherit; font-size: 1em;
  }
  .fb-irzn button {
    cursor: pointer; flex: 0 0 auto; background: transparent;
    color: inherit; border-radius: 6px; padding: 0.25em 0.6em; font: inherit;
  }
  /* keyboard focus affordance (WCAG 2.4.7) across every interactive control */
  .fb-t:focus-visible, .fb-btn:focus-visible,
  .site-unlock__x:focus-visible, .site-unlock__pw:focus-visible, .site-unlock__go:focus-visible,
  .fb-irzn input:focus-visible, .fb-reason textarea:focus-visible,
  .propose__topic:focus-visible, .propose__detail:focus-visible {
    outline: 2px solid var(--accent); outline-offset: 2px;
  }
</style>
<script>
(function () {
  // --- feedback-sink config — see tools/feedback-sink/README.md for redeploy ----
  var FEEDBACK_ENABLED = true; // LIVE 2026-06-18 — feedback-sink Worker deployed + verified
  var FEEDBACK_URL = "https://feedback-sink.khalic-lab.workers.dev"; // deployed, confirmed
  // -----------------------------------------------------------------------------
  // Kill switch: set FEEDBACK_ENABLED to false to hide the widget site-wide.
  if (!FEEDBACK_ENABLED || !window.__BRIEF || !window.__BRIEF.slug || !window.fetch) return;

  var SLUG = window.__BRIEF.slug; // "{date}-{stream}", e.g. "2026-06-19-overview"

  // slugify() reproduces tools/dedup/dedup.py slugify() EXACTLY:
  //   re.sub(r"[^a-z0-9]+", "-", s.lower()).strip("-")[:48].strip("-") or "story"
  function slugify(s) {
    s = (s || '').toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-+|-+$/g, '');
    s = s.slice(0, 48).replace(/-+$/, '');
    return s || 'story';
  }
  // Per-story id = "{SLUG}-{slugify(visible bold lead)}". Keyed on the rendered bold lead
  // (the story's <strong> title) — NOT the dedup index `headline`, which the writer curates
  // separately and does not match the lead. The Evaluator joins by slugifying the same bold
  // leads from the brief markdown, so both sides derive the id from one shared source.
  function storyIdFor(headline) { return SLUG + '-' + slugify(headline); }

  function post(payload, onStatus) {
    var key = window.__siteKey && window.__siteKey.get();
    if (!key) {
      if (onStatus) onStatus('🔒 unlock first');
      if (window.__siteKey) window.__siteKey.prompt();
      return Promise.resolve(false);
    }
    var headers = { 'Content-Type': 'application/json', 'X-Widget-Key': key };
    if (onStatus) onStatus('sending…');
    return fetch(FEEDBACK_URL + '/submit', {
      method: 'POST', headers: headers,
      body: JSON.stringify({
        brief: SLUG, vote: payload.vote,
        reason: (payload.reason || '').trim(),
        story_id: payload.story_id || null, surface: 'web'
      })
    }).then(function (r) {
      if (r.status === 403 && window.__siteKey) { window.__siteKey.clear(); window.__siteKey.prompt(); if (onStatus) onStatus('🔒 wrong key'); return false; }
      if (onStatus) onStatus(r.ok ? 'thanks ✓' : 'failed (' + r.status + ')');
      return r.ok;
    }).catch(function () { if (onStatus) onStatus('offline — try later'); return false; });
  }

  document.addEventListener('DOMContentLoaded', function () {
    var content = document.querySelector('.page__content');
    if (!content) return;

    // ---- per-STORY inline thumbs ------------------------------------------------
    // A "story" bullet leads with the bold <strong> headline (mirrors dedup _BULLET_RE
    // `^- **...**`). kramdown renders the (loose) story list as <li><p><strong>…</strong>…,
    // and a tight list as <li><strong>…, so accept both shapes. Footer / "Gaps:" bullets
    // have no leading <strong>, so they're skipped automatically.
    function skipWrap(n) {
      while (n && n.classList && n.classList.contains('auto-preview-wrap')) n = n.nextElementSibling;
      return n;
    }
    // Stop at the Coverage footer (mirrors dedup extract_stories): bullets after that
    // heading are meta-commentary / Gaps, not stories.
    var footer = findCoverageFooter(content);
    content.querySelectorAll('li').forEach(function (li) {
      if (li.__fb) return;
      if (afterFooter(footer, li)) return;
      var node = skipWrap(li.firstElementChild);
      if (node && node.tagName === 'P') node = skipWrap(node.firstElementChild);
      if (!node || node.tagName !== 'STRONG') return;
      var headline = (node.textContent || '').trim();
      if (!headline) return;
      li.__fb = true;
      var sid = storyIdFor(headline);
      var container = node.parentNode; // <p> in a loose list, the <li> in a tight one

      var bar = document.createElement('span');
      bar.className = 'fb-inline';
      bar.innerHTML =
        '<button class="fb-t" data-v="1" title="useful" aria-label="useful">👍</button>' +
        '<button class="fb-t" data-v="-1" title="not useful" aria-label="not useful">👎</button>' +
        '<span class="fb-ist" aria-live="polite"></span>';
      var ist = bar.querySelector('.fb-ist');
      var up = bar.querySelector('.fb-t[data-v="1"]');
      var down = bar.querySelector('.fb-t[data-v="-1"]');

      var rzn = document.createElement('span');
      rzn.className = 'fb-irzn';
      rzn.innerHTML =
        '<input type="text" placeholder="why? (optional)" maxlength="500" aria-label="Reason for thumbs-down (optional)" />' +
        '<button type="button">send</button>';
      var input = rzn.querySelector('input');
      var sendBtn = rzn.querySelector('button');
      sendBtn.setAttribute('aria-label', 'Send reason for: ' + headline);

      function mark(v) {
        bar.classList.add('fb-live');
        up.classList.toggle('fb-on', v === 1); up.classList.toggle('fb-off', v === -1);
        down.classList.toggle('fb-on', v === -1); down.classList.toggle('fb-off', v === 1);
      }
      up.addEventListener('click', function () {
        mark(1); rzn.style.display = 'none';
        post({ vote: 1, story_id: sid }, function (m) { ist.textContent = m; });
      });
      down.addEventListener('click', function () {
        mark(-1);
        // the thumb itself is signal — fire now; a reason can follow.
        post({ vote: -1, story_id: sid }, function (m) { ist.textContent = m; });
        rzn.style.display = 'flex'; input.focus();
      });
      function sendReason() {
        var why = (input.value || '').trim();
        if (!why) { rzn.style.display = 'none'; down.focus(); return; }
        post({ vote: -1, story_id: sid, reason: why }, function (m) { ist.textContent = m; });
        rzn.style.display = 'none';
        down.focus();   // return focus to the bullet's control, not the void
      }
      sendBtn.addEventListener('click', sendReason);
      input.addEventListener('keydown', function (e) { if (e.key === 'Enter') sendReason(); });

      container.appendChild(bar);
      container.appendChild(rzn);
    });

    // ---- bottom OVERALL box (brief-level, story_id == null) ---------------------
    var vote = 0; // 0 = none, +1, -1
    var box = document.createElement('div');
    box.className = 'fb-box';
    box.innerHTML =
      '<div class="fb-row">' +
        '<span class="fb-q">Overall — useful?</span>' +
        '<button class="fb-btn" data-v="1" aria-label="thumbs up">👍</button>' +
        '<button class="fb-btn" data-v="-1" aria-label="thumbs down">👎</button>' +
        '<span class="fb-status" aria-live="polite"></span>' +
      '</div>' +
      '<div class="fb-reason">' +
        '<textarea aria-label="Feedback about the whole brief" placeholder="optional: about the brief as a whole (what to do more / less of)"></textarea>' +
        '<div><button class="fb-btn fb-send">Send</button></div>' +
      '</div>';
    content.appendChild(box);

    var status = box.querySelector('.fb-status');
    var reasonWrap = box.querySelector('.fb-reason');
    var textarea = box.querySelector('textarea');
    var thumbs = box.querySelectorAll('.fb-btn[data-v]');

    function setVote(v) {
      vote = v;
      thumbs.forEach(function (b) { b.classList.toggle('fb-on', +b.dataset.v === v); });
      reasonWrap.style.display = 'block';
      textarea.focus();
    }
    function send(done) {
      if (!vote) { status.textContent = 'pick 👍 or 👎 first'; return; }
      post({ vote: vote, reason: textarea.value || '' }, function (m) { status.textContent = m; })
        .then(function (ok) { if (ok && done) done(); });
    }
    thumbs.forEach(function (b) {
      b.addEventListener('click', function () {
        setVote(+b.dataset.v);
        // a thumb with no reason is still a signal: fire immediately, reason can follow.
        send(null);
      });
    });
    box.querySelector('.fb-send').addEventListener('click', function () {
      send(function () { reasonWrap.style.display = 'none'; thumbs[0].focus(); });
    });
  });
})();
</script>

<!-- ============================================================================
     Editorial restyle v3 — single column, real headlines, large figures, light+dark.
     Layered over minimal-mistakes "default" skin; loads last in <head>.
     Knobs: the CSS variables in :root (light) + the prefers-color-scheme block (dark).
     ========================================================================= -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,900&family=Inter:wght@400;500;600&family=Source+Serif+4:ital,wght@0,400;0,600;1,400&display=swap">
<style>
  :root{
    --paper:#f3efe7; --panel:#eae4d8; --ink:#26241f; --muted:#736b5d; --muted-ui:#6a6356;
    --rule:rgba(38,36,31,.82); --hair:rgba(38,36,31,.13); --field:#fffdf8;
    --frame:rgba(38,36,31,.42); --accent:#9c3b2c;
    --accent-chip:#b80000; --accent-chip-hover:#8d0000;
    --serif:'Source Serif 4',Charter,Georgia,'Times New Roman',serif;
    --display:'Fraunces','Source Serif 4',Georgia,serif;
    --sans:'Inter',-apple-system,BlinkMacSystemFont,'Helvetica Neue',Arial,sans-serif;
  }
  @media (prefers-color-scheme: dark){
    :root{
      --paper:#16140f; --panel:#201d16; --ink:#e8e2d3; --muted:#9c9482; --muted-ui:#b3ab97;
      --rule:rgba(232,226,211,.5); --hair:rgba(232,226,211,.12); --field:rgba(255,255,255,.05);
      --frame:rgba(232,226,211,.28); --accent:#d98a5b;
      --accent-chip:#c0392b; --accent-chip-hover:#a93226;
    }
  }

  html,body{ background:var(--paper); color:var(--ink); }
  body{ font-family:var(--serif); text-rendering:optimizeLegibility; -webkit-font-smoothing:antialiased; }
  #main,.initial-content,.page,.archive,.masthead,.greedy-nav,.greedy-nav .visible-links{ background:var(--paper); }
  /* secondary theme surfaces that otherwise flash the stock white skin in dark mode */
  .greedy-nav .hidden-links{ background:var(--paper); }
  .sidebar,.toc__menu,.notice,.notice--primary,.notice--info,.notice--warning{ background:var(--panel); color:var(--ink); }
  .page__content{ font-size:1.06rem; line-height:1.5; max-width:42em; margin-left:auto; margin-right:auto; }
  .page__content p{ margin:0 0 .85em; }
  /* prose links only — leave theme chrome (pagination/taxonomy/breadcrumbs) to the skin */
  .page__content a{ color:var(--ink); text-decoration:underline; text-decoration-thickness:1px;
    text-underline-offset:2px; text-decoration-color:var(--frame); }
  .page__content a:hover{ color:var(--accent); text-decoration-color:var(--accent); }
  strong,.page__content strong{ font-weight:600; }

  /* masthead — quiet, sans nav */
  .masthead{ border-bottom:1px solid var(--rule); }
  .site-title{ font-family:var(--display); font-weight:900; letter-spacing:-.01em; font-size:1.3em; color:var(--ink); }
  .greedy-nav a{ font-family:var(--sans); text-transform:uppercase; letter-spacing:.12em; font-size:.72em;
    font-weight:500; color:var(--ink); }

  /* article masthead */
  .page__title{ font-family:var(--display); font-weight:900; line-height:1.05; letter-spacing:-.015em;
    font-size:2.3em; margin:.1em 0 .35em; }
  .page__meta{ font-family:var(--sans); text-transform:uppercase; letter-spacing:.08em; font-weight:500;
    font-size:.7em; color:var(--muted-ui); border:0; padding:0; margin:0 0 1.6em; }

  /* section headers — tracked sans kicker, rule above (leading emoji stripped by the script below) */
  .page__content h2{ font-family:var(--sans); font-weight:600; text-transform:uppercase; letter-spacing:.14em;
    font-size:.82em; color:var(--muted-ui); margin:2.4em 0 1.2em; padding-top:1em; border-top:1px solid var(--rule); }
  .page__content h2:first-of-type{ margin-top:.7em; }
  .page__content h3{ font-family:var(--display); font-weight:600; font-size:1.25em; line-height:1.25; margin:1.6em 0 .4em; }

  /* one story per row, SINGLE column — generous separation. `.story` is tagged by the JS
     normalizer above, so this styling targets ONLY real story bullets — never the
     Coverage-footer / "Gaps:" list, which stays as ordinary prose. */
  .page__content > ul{ list-style:none; padding-left:0; margin:0; }
  .page__content > ul > li.story{ display:flex; flex-direction:column; padding-bottom:1.6em; margin-bottom:1.6em;
    border-bottom:1px solid var(--hair); }
  .page__content > ul > li.story:last-child{ border-bottom:0; }
  .page__content > ul > li.story > p{ margin:0; }
  .page__content ul ul{ list-style:disc; margin:.4em 0 0; }
  .page__content > ul > li.story > ul{ order:3; }

  /* HEADLINE: the lead bold becomes a real display headline on its own line */
  .page__content > ul > li.story > p:first-of-type > strong:first-child{
    display:block; font-family:var(--display); font-weight:600; font-size:1.32em; line-height:1.18;
    letter-spacing:-.005em; color:var(--ink); margin:0 0 .35em; }
  /* arXiv / paper items. Two writer markup shapes occur in the corpus, both keyed on the STATIC
     citation anchor a[href*="arxiv.org"] (present at build time — no chip FOUC):
       (A) two <strong>:  `arXiv:ID · submitted DATE` <code>[preprint]</code> — `Real Title`
       (B) one  <strong>: `<code>arXiv:ID</code> (date) — Title`
     (A): demote the id+date 1st strong to small grey meta, promote the 2nd strong to the headline.
     (B): the single strong is already the headline via the default rule above; here we only
          demote its inner <code> id to small grey meta.
     Shape-A rules are gated on a 2nd strong; the shape-B code rule on its absence. */
  .page__content > ul > li.story:has(a[href*="arxiv.org"]):has(> p:first-of-type > strong:nth-of-type(2)) > p:first-of-type > strong:first-child{
    display:inline; font-family:var(--sans); font-weight:500; font-size:.7em; text-transform:uppercase;
    letter-spacing:.05em; color:var(--muted-ui); }
  .page__content > ul > li.story:has(a[href*="arxiv.org"]):has(> p:first-of-type > strong:nth-of-type(2)) > p:first-of-type > strong:nth-of-type(2){
    display:block; font-family:var(--display); font-weight:600; font-size:1.32em; line-height:1.18;
    letter-spacing:-.005em; color:var(--ink); margin:.2em 0 .35em; }
  .page__content > ul > li.story:has(a[href*="arxiv.org"]):not(:has(> p:first-of-type > strong:nth-of-type(2))) > p:first-of-type > strong:first-child code{
    display:inline; font-family:var(--sans); font-size:.62em; font-weight:500; text-transform:uppercase;
    letter-spacing:.05em; color:var(--muted-ui); border:0; padding:0; }

  /* tags as delicate pills */
  .page__content code{ font-family:var(--sans); font-size:.72em; font-weight:500; text-transform:uppercase;
    letter-spacing:.04em; color:var(--muted); background:transparent; border:1px solid var(--hair);
    border-radius:999px; padding:.12em .6em; }

  .page__content blockquote{ border-left:2px solid var(--accent); background:var(--panel); font-style:italic;
    margin:1.1em 0; padding:.5em 1.1em; color:var(--ink); }
  .page__content hr{ border:0; border-top:1px solid var(--rule); margin:2.4em 0; }

  /* LARGE figures: real size (natural, never upscaled), framed, below the story; full-width on mobile */
  a.auto-preview-wrap{ order:2; align-self:flex-start; display:block; margin:1em 0 0; cursor:zoom-in; }
  .auto-preview-wrap img.auto-preview{ display:block; width:auto; max-width:100%; max-height:420px;
    border:1px solid var(--frame); border-radius:4px; background:var(--field); padding:5px;
    box-shadow:none; object-fit:cover; }
  a.auto-preview-wrap:hover img.auto-preview{ opacity:.9; }
  img.auto-preview.fav{ display:inline-block; width:16px; height:16px; margin:0 .3em; border:0;
    border-radius:2px; padding:0; vertical-align:middle; }
  @media (max-width:680px){
    .auto-preview-wrap img.auto-preview{ width:100%; max-height:56vw; object-fit:cover; }  /* ~16:9, no viewport-eating portraits */
    .page__title{ font-size:1.9em; }
    /* comfortable tap targets (>=44px) without shifting layout (padding offset by negative margin) */
    .fb-t{ padding:.7em .55em; margin:-.55em -.55em; }
    .fb-btn{ padding:.6em 1em; min-height:44px; display:inline-flex; align-items:center; }
    .site-unlock__x{ padding:.5em; top:0; right:0; }
  }

  /* home / archive contents list */
  .archive__item-title{ font-family:var(--display); font-weight:600; }
  .archive__item-title a{ text-decoration:none; }
  .archive__item-excerpt{ font-family:var(--serif); color:var(--muted); }
  .list__item{ border-bottom:1px solid var(--hair); padding-bottom:1em; margin-bottom:1em; }
  .archive__subtitle{ font-family:var(--sans); text-transform:uppercase; letter-spacing:.12em; font-size:.9em;
    color:var(--muted); border-bottom:1px solid var(--rule); }

  /* footer — small sans, recedes */
  .page__footer{ background:var(--paper); border-top:1px solid var(--rule); color:var(--muted-ui);
    font-family:var(--sans); font-size:.8em; }
  .page__footer a,.page__footer-copyright{ color:var(--muted-ui); }
  .page__footer a{ text-decoration:underline; text-decoration-thickness:1px; text-underline-offset:2px; }

  /* feedback widget — variable-driven, follows light/dark automatically */
  .fb-box{ border:1px solid var(--hair); background:var(--panel); }
  .fb-btn{ border:1px solid var(--frame); }
  .fb-btn:hover{ background:var(--hair); }
  .fb-btn.fb-on{ background:transparent; border-color:var(--accent); color:var(--accent); }
  .fb-reason textarea,.fb-irzn input{ background:var(--field); border:1px solid var(--frame); color:var(--ink); }
  .fb-t.fb-on{ filter:none; color:var(--accent); }
  .fb-irzn button{ border:1px solid var(--frame); }
  .fb-q,.fb-status,.fb-ist{ font-family:var(--sans); }
  .fb-inline{ display:block; margin:.6em 0 0; }  /* per-story thumbs on their own line under the story */
  /* readable placeholders (the stock ~50% grey fails AA in light mode) */
  .fb-reason textarea::placeholder, .fb-irzn input::placeholder,
  .site-unlock__pw::placeholder, .propose__topic::placeholder, .propose__detail::placeholder{
    color:var(--muted-ui); opacity:1; }
</style>
<script>
  // Strip the leading section-header emoji for a cleaner editorial look; the tracked kicker
  // styling carries the hierarchy. Only mutates the rendered page — source briefs are untouched.
  document.addEventListener('DOMContentLoaded', function () {
    var c = document.querySelector('.page__content'); if (!c) return;
    // Strip a leading emoji run (incl. variation selectors / ZWJ sequences) + trailing space.
    // Prefer Unicode property escapes; fall back to the legacy literal range on old engines.
    var LEAD;
    try { LEAD = /^(?:\p{Extended_Pictographic}(?:️|‍\p{Extended_Pictographic})*\s*)+/u; }
    catch (e) { LEAD = /^[\s←-⯿☀-➿\uD800-\uDFFF️‍]+/; }
    c.querySelectorAll('h2, h3').forEach(function (h) {
      var n = h.firstChild;
      if (n && n.nodeType === 3) n.nodeValue = n.nodeValue.replace(LEAD, '');
    });
  });
</script>

<style>
  /* ---- shared-key unlock modal + propose-a-brief form ---- */
  .site-unlock{ position:fixed; inset:0; display:none; align-items:center; justify-content:center;
    background:rgba(0,0,0,.45); z-index:9999; }
  .site-unlock.on{ display:flex; }
  .site-unlock__box{ position:relative; width:90%; max-width:23em; background:var(--paper); color:var(--ink);
    border:1px solid var(--rule); padding:1.6em 1.5em; box-shadow:0 8px 44px rgba(0,0,0,.32); }
  .site-unlock__x{ position:absolute; top:.3em; right:.45em; background:none; border:0; font-size:1.5em;
    line-height:1; cursor:pointer; color:var(--muted); }
  .site-unlock__title{ font-family:var(--display); font-weight:700; font-size:1.4em; margin-bottom:.15em; }
  .site-unlock__sub{ font-family:var(--serif); font-size:.85em; color:var(--muted); margin:0 0 1em; }
  /* present for password managers, kept off-screen (a password-only form confuses them) */
  .site-unlock__user{ position:absolute; left:-9999px; top:0; width:1px; height:1px; opacity:0; }
  .site-unlock__pw{ width:100%; box-sizing:border-box; font:inherit; font-size:1em; padding:.5em .6em;
    background:var(--field); color:var(--ink); border:1px solid var(--frame); border-radius:6px; }
  .site-unlock__go{ margin-top:.85em; }
  .site-unlock__msg{ display:block; font-family:var(--sans); font-size:.8em; color:var(--muted); margin-top:.5em; min-height:1em; }

  .propose{ max-width:44em; margin:2.4em auto; }
  .propose__form{ display:flex; flex-direction:column; gap:.6em; }
  .propose__topic, .propose__detail{ width:100%; box-sizing:border-box; font:inherit; padding:.5em .6em;
    background:var(--field); color:var(--ink); border:1px solid var(--frame); border-radius:6px; }
  .propose__topic{ font-family:var(--display); font-size:1.05em; }
  .propose__detail{ min-height:4em; resize:vertical; font-family:var(--serif); }
  .propose__form .fb-btn{ align-self:flex-start; }
  .propose__msg{ font-family:var(--sans); font-size:.8em; color:var(--muted); margin-left:.5em; }
</style>
<script>
(function () {
  if (typeof window === 'undefined' || !window.fetch || !window.localStorage) return;
  var WORKER = "https://feedback-sink.khalic-lab.workers.dev";
  var LS = "siteKey";
  var panel = null, pending = null, lastFocus = null;

  function get(){ try { return localStorage.getItem(LS) || ''; } catch (e) { return ''; } }
  function set(v){ try { localStorage.setItem(LS, v); } catch (e) {} }
  function clear(){ try { localStorage.removeItem(LS); } catch (e) {} }

  function build(){
    panel = document.createElement('div');
    panel.className = 'site-unlock';
    panel.innerHTML =
      '<form class="site-unlock__box" role="dialog" aria-modal="true" aria-labelledby="unlock-dlg-title" action="#" autocomplete="on">' +
        '<button type="button" class="site-unlock__x" aria-label="close">×</button>' +
        '<div class="site-unlock__title" id="unlock-dlg-title">Unlock to interact</div>' +
        '<p class="site-unlock__sub">Enter the shared site key to give feedback or propose a brief. It stays in this browser.</p>' +
        '<input type="text" name="username" value="khalic-lab" autocomplete="username" class="site-unlock__user" readonly tabindex="-1" aria-hidden="true">' +
        '<input type="password" name="password" autocomplete="current-password" class="site-unlock__pw" placeholder="site key" aria-label="site key" required>' +
        '<button type="submit" class="fb-btn site-unlock__go">Unlock</button>' +
        '<span class="site-unlock__msg"></span>' +
      '</form>';
    document.body.appendChild(panel);
    var pw = panel.querySelector('.site-unlock__pw');
    panel.querySelector('.site-unlock__x').addEventListener('click', hide);
    panel.addEventListener('click', function (e) { if (e.target === panel) hide(); });
    // Escape closes; Tab/Shift+Tab is trapped inside the dialog (×, key field, Unlock).
    panel.addEventListener('keydown', function (e) {
      if (e.key === 'Escape') { hide(); return; }
      if (e.key !== 'Tab') return;
      var f = [panel.querySelector('.site-unlock__x'), pw, panel.querySelector('.site-unlock__go')];
      var first = f[0], last = f[f.length - 1];
      if (e.shiftKey && document.activeElement === first) { e.preventDefault(); last.focus(); }
      else if (!e.shiftKey && document.activeElement === last) { e.preventDefault(); first.focus(); }
    });
    panel.querySelector('form').addEventListener('submit', function (e) {
      e.preventDefault();
      var v = (pw.value || '').trim();
      if (!v) return;
      set(v); hide();
      var cb = pending; pending = null;
      if (cb) cb();
    });
  }
  function show(){ lastFocus = document.activeElement; if (!panel) build(); panel.classList.add('on');
    var pw = panel.querySelector('.site-unlock__pw'); pw.value = ''; setTimeout(function(){ pw.focus(); }, 30); }
  function hide(){ if (panel) panel.classList.remove('on');
    if (lastFocus && lastFocus.focus) { lastFocus.focus(); lastFocus = null; } }

  window.__siteKey = { get: get, set: set, clear: clear, prompt: function (retry) { pending = retry || null; show(); } };

  // Propose-a-brief form (home page only)
  document.addEventListener('DOMContentLoaded', function () {
    var form = document.querySelector('.propose__form');
    if (!form) return;
    var topic = form.querySelector('[name=topic]');
    var detail = form.querySelector('[name=detail]');
    var msg = form.querySelector('.propose__msg');
    form.addEventListener('submit', function (e) {
      e.preventDefault();
      var t = (topic.value || '').trim();
      if (!t) { topic.focus(); return; }
      (function send(){
        var key = get();
        if (!key) { msg.textContent = '🔒 unlock first'; window.__siteKey.prompt(send); return; }
        msg.textContent = 'sending…';
        fetch(WORKER + '/propose', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'X-Widget-Key': key },
          body: JSON.stringify({ topic: t, detail: (detail.value || '').trim(), surface: 'web' })
        }).then(function (r) {
          if (r.status === 403) { clear(); msg.textContent = '🔒 wrong key'; window.__siteKey.prompt(send); return; }
          if (r.ok) { msg.textContent = 'proposed — thanks ✓'; topic.value = ''; detail.value = ''; }
          else msg.textContent = 'failed (' + r.status + ')';
        }).catch(function () { msg.textContent = 'offline — try again later'; });
      })();
    });
  });
})();
</script>
