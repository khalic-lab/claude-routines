<style>
  /* favicon badge stays inline next to its link */
  img.auto-preview.fav {
    display: inline-block;
    width: 16px; height: 16px;
    margin: 0 0.3em;
    vertical-align: middle;
    border-radius: 2px;
  }
  /* real article thumbnails float right of the containing bullet/paragraph */
  a.auto-preview-wrap {
    float: right;
    margin: 0.2em 0 0.5em 1em;
    shape-outside: margin-box;
    clear: right;
    display: block;
    text-decoration: none;
    cursor: zoom-in;
  }
  a.auto-preview-wrap:hover img.auto-preview { opacity: 0.85; }
  .auto-preview-wrap img.auto-preview {
    display: block;
    max-width: 180px;
    max-height: 120px;
    border-radius: 4px;
    object-fit: cover;
  }
  /* clear floats at the end of each bullet so consecutive thumbnails stack */
  .page__content li::after,
  .page__content p::after { content: ""; display: block; clear: right; }
  /* arxiv PDF chip — inline pill */
  a.auto-preview.pdf {
    display: inline-block;
    font-size: 0.7em;
    font-weight: 700;
    line-height: 1;
    color: #fff;
    background: #b80000;

    margin: 0 0.4em;

  a.auto-preview.pdf:hover { background: #8d0000; }

<script>
// Workaround for minimal-mistakes assuming .page__content always exists.
// Theme's main.min.js does `document.querySelector(".page__content").querySelectorAll(...)`
// which throws on layouts without that wrapper (e.g. layout: home). Stub it in.
document.addEventListener('DOMContentLoaded', function () {
  if (!document.querySelector('.page__content')) {
    var stub = document.createElement('div');
    stub.className = 'page__content';
    stub.style.display = 'none';
    document.body.appendChild(stub);
  }
}, { once: true });
</script>
<script>
(function () {
  if (typeof window === 'undefined' || !window.fetch || !('IntersectionObserver' in window)) return;
  // sessionStorage key prefix; bump suffix to force-invalidate prior entries
  // when the unfurl backend or response shape changes.
  var CACHE = 'autoPreview:v2:';
  var favicon = function (url) {
    try {
      var h = new URL(url).hostname;
      return 'https://www.google.com/s2/favicons?domain=' + h + '&sz=64';
    } catch (e) { return null; }
  };
  var unfurl = function (url) {
    return fetch('https://og-proxy.khalic-lab.workers.dev/?url=' + encodeURIComponent(url))
      .then(function (r) { return r.ok ? r.json() : null; })
      .then(function (j) { return j && j.image ? j.image : null; })
      .catch(function () { return null; });
  };
  // Real article thumbnails float right of the containing bullet/paragraph,
  // one per container. Favicons stay inline after the link as small badges.
  var IMAGED = '__autoPreviewImaged';
  var bulletContainer = function (el) {
    return el.closest('li') || el.closest('p') || el.parentNode;
  };
  var render = function (link, src, isFavicon) {
    if (!src) return;
    var img = document.createElement('img');
    img.className = 'auto-preview' + (isFavicon ? ' fav' : '');
    img.loading = 'lazy';
    img.referrerPolicy = 'no-referrer';
    img.src = src;
    img.alt = '';
    if (isFavicon) {
      link.parentNode.insertBefore(img, link.nextSibling);
      return;
    }
    var bullet = bulletContainer(link);
    if (!bullet || bullet[IMAGED]) return; // one image per bullet
    bullet[IMAGED] = true;
    var wrap = document.createElement('a');
    wrap.className = 'auto-preview-wrap';
    wrap.href = src;
    wrap.target = '_blank';
    wrap.rel = 'noopener noreferrer';
    wrap.appendChild(img);
    bullet.insertBefore(wrap, bullet.firstChild);
  };
  // arxiv.org sets the same logo as og:image for every paper. The og-proxy
  // returns nothing useful, so skip the unfurl and render a small "PDF" chip
  // linking directly to the paper PDF instead.
  var ARXIV_HOSTS = { 'arxiv.org': 1, 'www.arxiv.org': 1, 'export.arxiv.org': 1 };
  var ARXIV_PATH = /^\/(?:abs|pdf|html)\/([\w.-]+?)(?:v\d+)?(?:\.pdf)?\/?$/;
  var arxivPdfUrl = function (link) {
    if (!ARXIV_HOSTS[link.hostname]) return null;
    var m = link.pathname.match(ARXIV_PATH);
    return m ? 'https://arxiv.org/pdf/' + m[1] + '.pdf' : null;
  };
  var renderPdfChip = function (link, pdfHref) {
    var a = document.createElement('a');
    a.className = 'auto-preview pdf';
    a.href = pdfHref;
    a.target = '_blank';
    a.rel = 'noopener';
    a.textContent = 'PDF';
    link.parentNode.insertBefore(a, link.nextSibling);
  };
  var attach = function (link) {
    if (link.dataset.previewed) return;
    link.dataset.previewed = '1';
    var pdf = arxivPdfUrl(link);
    if (pdf) { renderPdfChip(link, pdf); return; }
    var href = link.href;
    var cached = sessionStorage.getItem(CACHE + href);
    if (cached !== null) {
      if (cached) render(link, cached, cached.indexOf('s2/favicons') !== -1);
      return;
    }
    unfurl(href).then(function (src) {
      var fb = favicon(href);
      var final = src || fb;
      try { sessionStorage.setItem(CACHE + href, final || ''); } catch (e) {}
      render(link, final, !src && !!fb);
    });
  };
  document.addEventListener('DOMContentLoaded', function () {
    var content = document.querySelector('.page__content');
    if (!content) return;
    var io = new IntersectionObserver(function (entries) {
      entries.forEach(function (e) {
        if (e.isIntersecting) {
          attach(e.target);
          io.unobserve(e.target);
        }
      });
    }, { rootMargin: '300px 0px' });
    content.querySelectorAll('a[href^="http"]').forEach(function (l) {
      if (l.closest('.page__share') || l.closest('nav')) return;
      if (l.host === window.location.host) return;
      io.observe(l);
    });
  });
})();
</script>

<script>
  // Injected by Jekyll on post pages only: the brief's index slug, e.g.
  // "2026-06-07-overview". Matches the _posts filename + index/stories key, so per-story
  // feedback (v2) can key the same id the dedup index uses.
  window.__BRIEF = { slug: "{{ page.date | date: '%Y-%m-%d' }}-{{ page.categories | first }}" };
</script>
{%- endif -%}

<style>
  /* bottom-of-brief OVERALL box (brief-level feedback, story_id == null) */
  .fb-box {
    margin: 2.5em 0 1em; padding: 0.9em 1.1em;
    border: 1px solid rgba(255,255,255,0.14); border-radius: 8px;
    background: rgba(255,255,255,0.03); font-size: 0.85em;
  }
  .fb-box .fb-row { display: flex; align-items: center; gap: 0.6em; flex-wrap: wrap; }
  .fb-box .fb-q { opacity: 0.8; margin-right: 0.2em; }
  .fb-btn {
    cursor: pointer; border: 1px solid rgba(255,255,255,0.2); background: transparent;
    color: inherit; border-radius: 6px; padding: 0.25em 0.6em; font-size: 1em; line-height: 1;
  }
  .fb-btn:hover { background: rgba(255,255,255,0.08); }
  .fb-btn.fb-on { background: rgba(120,170,255,0.25); border-color: rgba(120,170,255,0.6); }
  .fb-reason { display: none; width: 100%; margin-top: 0.6em; }
  .fb-reason textarea {

  .fb-send { margin-top: 0.5em; }

  /* per-STORY inline thumbs (story_id set) — faint until you hover the bullet */

    font-size: 0.92em; opacity: 0.3; transition: opacity 0.12s ease; vertical-align: baseline;
  }
  li:hover .fb-inline, .fb-inline.fb-live { opacity: 0.95; }
  .fb-t {
    cursor: pointer; border: none; background: transparent; color: inherit;
    padding: 0 0.12em; font-size: 1em; line-height: 1; opacity: 0.85;
  }

  .fb-t.fb-on { opacity: 1; filter: drop-shadow(0 0 2px rgba(120,170,255,0.9)); }
  .fb-t.fb-off { opacity: 0.3; }
  .fb-ist { font-size: 0.8em; opacity: 0.7; margin-left: 0.3em; }

    background: transparent; color: inherit; border-radius: 6px; padding: 0.25em 0.6em; font: inherit;

</style>
<script>
(function () {
  // --- configure after deploying feedback-sink (README step 5) -----------------
  var FEEDBACK_ENABLED = true; // LIVE 2026-06-18 — feedback-sink Worker deployed + verified
  var FEEDBACK_URL = "https://feedback-sink.khalic-lab.workers.dev"; // deployed, confirmed
  var FEEDBACK_KEY = ""; // no WIDGET_KEY set on the Worker
  // -----------------------------------------------------------------------------
  // Dormant until enabled: keeps the published site from showing a widget that posts to
  // a Worker that doesn't exist yet.
  if (!FEEDBACK_ENABLED || !window.__BRIEF || !window.__BRIEF.slug || !window.fetch) return;

  var SLUG = window.__BRIEF.slug; // "{date}-{stream}", e.g. "2026-06-19-overview"

  // slugify() reproduces tools/dedup/dedup.py slugify() EXACTLY:
  //   re.sub(r"[^a-z0-9]+", "-", s.lower()).strip("-")[:48].strip("-") or "story"
  function slugify(s) {
    s = (s || '').toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-+|-+$/g, '');
    s = s.slice(0, 48).replace(/-+$/, '');
    return s || 'story';
  }
  // Per-story id = "{SLUG}-{slugify(visible bold lead)}". Keyed on the rendered bold lead
  // (the story's <strong> title) — NOT the dedup index `headline`, which the writer curates
  // separately and does not match the lead. The Evaluator joins by slugifying the same bold
  // leads from the brief markdown, so both sides derive the id from one shared source.
  function storyIdFor(headline) { return SLUG + '-' + slugify(headline); }

  function post(payload, onStatus) {
    var headers = { 'Content-Type': 'application/json' };
    if (FEEDBACK_KEY) headers['X-Widget-Key'] = FEEDBACK_KEY;
    if (onStatus) onStatus('sending…');
    return fetch(FEEDBACK_URL + '/submit', {
      method: 'POST', headers: headers,
      body: JSON.stringify({
        brief: SLUG, vote: payload.vote,
        reason: (payload.reason || '').trim(),
        story_id: payload.story_id || null, surface: 'web'
      })
    }).then(function (r) {
      if (onStatus) onStatus(r.ok ? 'thanks ✓' : 'failed (' + r.status + ')');
      return r.ok;
    }).catch(function () { if (onStatus) onStatus('offline — try later'); return false; });
  }

  document.addEventListener('DOMContentLoaded', function () {
    var content = document.querySelector('.page__content');
    if (!content) return;

    // ---- per-STORY inline thumbs ------------------------------------------------
    // A "story" bullet leads with the bold <strong> headline (mirrors dedup _BULLET_RE
    // `^- **...**`). kramdown renders the (loose) story list as <li><p><strong>…</strong>…,
    // and a tight list as <li><strong>…, so accept both shapes. Footer / "Gaps:" bullets
    // have no leading <strong>, so they're skipped automatically.
    function skipWrap(n) {
      while (n && n.classList && n.classList.contains('auto-preview-wrap')) n = n.nextElementSibling;
      return n;
    }
    // Stop at the Coverage footer (mirrors dedup extract_stories): bullets after that
    // heading are meta-commentary / Gaps, not stories.
    var footer = null;
    content.querySelectorAll('h1,h2,h3,h4').forEach(function (h) {
      if (!footer && /coverage footer/i.test(h.textContent || '')) footer = h;
    });
    content.querySelectorAll('li').forEach(function (li) {
      if (li.__fb) return;
      if (footer && (footer.compareDocumentPosition(li) & Node.DOCUMENT_POSITION_FOLLOWING)) return;
      var node = skipWrap(li.firstElementChild);
      if (node && node.tagName === 'P') node = skipWrap(node.firstElementChild);
      if (!node || node.tagName !== 'STRONG') return;
      var headline = (node.textContent || '').trim();
      if (!headline) return;
      li.__fb = true;
      var sid = storyIdFor(headline);
      var container = node.parentNode; // <p> in a loose list, the <li> in a tight one

      var bar = document.createElement('span');
      bar.className = 'fb-inline';
      bar.innerHTML =
        '<button class="fb-t" data-v="1" title="useful" aria-label="useful">👍</button>' +
        '<button class="fb-t" data-v="-1" title="not useful" aria-label="not useful">👎</button>' +
        '<span class="fb-ist"></span>';
      var ist = bar.querySelector('.fb-ist');
      var up = bar.querySelector('.fb-t[data-v="1"]');
      var down = bar.querySelector('.fb-t[data-v="-1"]');

      var rzn = document.createElement('span');
      rzn.className = 'fb-irzn';
      rzn.innerHTML =
        '<input type="text" placeholder="why? (optional)" maxlength="500" />' +
        '<button type="button">send</button>';
      var input = rzn.querySelector('input');
      var sendBtn = rzn.querySelector('button');

      function mark(v) {
        bar.classList.add('fb-live');
        up.classList.toggle('fb-on', v === 1); up.classList.toggle('fb-off', v === -1);
        down.classList.toggle('fb-on', v === -1); down.classList.toggle('fb-off', v === 1);
      }
      up.addEventListener('click', function () {
        mark(1); rzn.style.display = 'none';
        post({ vote: 1, story_id: sid }, function (m) { ist.textContent = m; });
      });
      down.addEventListener('click', function () {
        mark(-1);
        // the thumb itself is signal — fire now; a reason can follow.
        post({ vote: -1, story_id: sid }, function (m) { ist.textContent = m; });
        rzn.style.display = 'inline-block'; input.focus();
      });
      function sendReason() {
        var why = (input.value || '').trim();
        if (!why) { rzn.style.display = 'none'; return; }
        post({ vote: -1, story_id: sid, reason: why }, function (m) { ist.textContent = m; });
        rzn.style.display = 'none';
      }
      sendBtn.addEventListener('click', sendReason);
      input.addEventListener('keydown', function (e) { if (e.key === 'Enter') sendReason(); });

      container.appendChild(bar);
      container.appendChild(rzn);
    });

    // ---- bottom OVERALL box (brief-level, story_id == null) ---------------------
    var vote = 0; // 0 = none, +1, -1
    var box = document.createElement('div');
    box.className = 'fb-box';
    box.innerHTML =
      '<div class="fb-row">' +
        '<span class="fb-q">Overall — useful?</span>' +
        '<button class="fb-btn" data-v="1" aria-label="thumbs up">👍</button>' +
        '<button class="fb-btn" data-v="-1" aria-label="thumbs down">👎</button>' +
        '<span class="fb-status"></span>' +
      '</div>' +
      '<div class="fb-reason">' +
        '<textarea placeholder="optional: about the brief as a whole (what to do more / less of)"></textarea>' +
        '<div><button class="fb-btn fb-send">Send</button></div>' +
      '</div>';
    content.appendChild(box);

    var status = box.querySelector('.fb-status');
    var reasonWrap = box.querySelector('.fb-reason');
    var textarea = box.querySelector('textarea');
    var thumbs = box.querySelectorAll('.fb-btn[data-v]');

    function setVote(v) {
      vote = v;
      thumbs.forEach(function (b) { b.classList.toggle('fb-on', +b.dataset.v === v); });
      reasonWrap.style.display = 'block';
      textarea.focus();
    }
    function send(done) {
      if (!vote) { status.textContent = 'pick 👍 or 👎 first'; return; }
      post({ vote: vote, reason: textarea.value || '' }, function (m) { status.textContent = m; })
        .then(function (ok) { if (ok && done) done(); });
    }
    thumbs.forEach(function (b) {
      b.addEventListener('click', function () {
        setVote(+b.dataset.v);
        // a thumb with no reason is still a signal: fire immediately, reason can follow.
        send(null);
      });
    });
    box.querySelector('.fb-send').addEventListener('click', function () {
      send(function () { reasonWrap.style.display = 'none'; });
    });
  });
})();
</script>

<!-- ============================================================================
     Editorial restyle v2 — refined type, light + dark, freed images.
     Layered over minimal-mistakes "default" skin; loads last in <head>.
     Knobs: the CSS variables in :root (light) and the prefers-color-scheme block (dark).
     ========================================================================= -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,900&family=Inter:wght@400;500;600&family=Source+Serif+4:ital,wght@0,400;0,600;1,400&display=swap">
<style>
  :root{
    --paper:#f3efe7; --panel:#eae4d8; --ink:#26241f; --muted:#736b5d;
    --rule:rgba(38,36,31,.82); --hair:rgba(38,36,31,.13); --field:#fffdf8;
    --frame:rgba(38,36,31,.42); --accent:#9c3b2c;
    --serif:'Source Serif 4',Charter,Georgia,'Times New Roman',serif;
    --display:'Fraunces','Source Serif 4',Georgia,serif;
    --sans:'Inter',-apple-system,BlinkMacSystemFont,'Helvetica Neue',Arial,sans-serif;
  }
  @media (prefers-color-scheme: dark){
    :root{
      --paper:#16140f; --panel:#201d16; --ink:#e8e2d3; --muted:#9c9482;
      --rule:rgba(232,226,211,.5); --hair:rgba(232,226,211,.12); --field:rgba(255,255,255,.05);
      --frame:rgba(232,226,211,.28); --accent:#d98a5b;
    }
  }

  html,body{ background:var(--paper); color:var(--ink); }
  body{ font-family:var(--serif); text-rendering:optimizeLegibility; -webkit-font-smoothing:antialiased; }
  #main,.initial-content,.page,.archive,.masthead,.greedy-nav,.greedy-nav .visible-links{ background:var(--paper); }
  .page__content{ font-size:1.05rem; line-height:1.5; max-width:40em; }
  .page__content p{ margin:0 0 .85em; }
  a,.page__content a{ color:var(--ink); text-decoration:underline; text-decoration-thickness:1px;
    text-underline-offset:2px; text-decoration-color:var(--hair); }
  a:hover,.page__content a:hover{ color:var(--accent); text-decoration-color:var(--accent); }
  strong,.page__content strong{ font-weight:600; }

  /* masthead — quiet, sans nav */
  .masthead{ border-bottom:1px solid var(--rule); }
  .site-title{ font-family:var(--display); font-weight:900; letter-spacing:-.01em; font-size:1.3em; color:var(--ink); }
  .greedy-nav a{ font-family:var(--sans); text-transform:uppercase; letter-spacing:.12em; font-size:.72em;
    font-weight:500; color:var(--ink); }

  /* article masthead */
  .page__title{ font-family:var(--display); font-weight:900; line-height:1.05; letter-spacing:-.015em;
    font-size:2.3em; margin:.1em 0 .35em; }
  .page__meta{ font-family:var(--sans); text-transform:uppercase; letter-spacing:.08em; font-weight:500;
    font-size:.7em; color:var(--muted); border:0; padding:0; margin:0 0 1.6em; }

  /* section headers — tracked sans kicker, rule above (leading emoji stripped by the script below) */
  .page__content h2{ font-family:var(--sans); font-weight:600; text-transform:uppercase; letter-spacing:.14em;
    font-size:.82em; color:var(--muted); margin:2.2em 0 1.05em; padding-top:1em; border-top:1px solid var(--rule); }
  .page__content h2:first-of-type{ margin-top:.7em; }
  .page__content h3{ font-family:var(--display); font-weight:600; font-size:1.25em; line-height:1.25; margin:1.6em 0 .4em; }

  /* stories as rows: text left, image its own column right (no text-wrap); nested lists drop full-width below */
  .page__content > ul{ list-style:none; padding-left:0; margin:0; }
  .page__content > ul > li{ display:flex; flex-wrap:wrap; align-items:flex-start; gap:1.6em;
    padding-bottom:1.25em; margin-bottom:1.25em; border-bottom:1px solid var(--hair); }
  .page__content > ul > li:last-child{ border-bottom:0; }
  .page__content > ul > li::after, .page__content > ul > li > p::after{ content:none; }  /* kill old float-clear pseudo (would be a stray flex item) */
  .page__content > ul > li > *{ min-width:0; }
  .page__content > ul > li > p{ flex:1 1 58%; margin:0; }
  .page__content > ul > li > .auto-preview-wrap{ order:2; flex:0 0 clamp(160px,30%,280px); }
  .page__content > ul > li > ul{ order:3; flex:1 1 100%; }
  .page__content ul ul{ list-style:disc; margin:.4em 0 0; }

  /* lead headline: display face, lighter than a bold blob */
  .page__content > ul > li p:first-child > strong:first-child{ font-family:var(--display); font-weight:600; font-size:1.06em; }

  /* tags as delicate pills */
  .page__content code{ font-family:var(--sans); font-size:.72em; font-weight:500; text-transform:uppercase;
    letter-spacing:.04em; color:var(--muted); background:transparent; border:1px solid var(--hair);
    border-radius:999px; padding:.12em .6em; }

  .page__content blockquote{ border-left:2px solid var(--accent); background:var(--panel); font-style:italic;
    margin:1.1em 0; padding:.5em 1.1em; color:var(--ink); }
  .page__content hr{ border:0; border-top:1px solid var(--rule); margin:2.2em 0; }

  /* freed images: own column, soft frame; stack full-width on mobile */
  a.auto-preview-wrap{ display:block; margin:.2em 0; }
  .auto-preview-wrap img.auto-preview{ width:100%; max-width:280px; max-height:210px; object-fit:cover;
    border:1px solid var(--frame); background:var(--field); padding:4px; box-shadow:none; }
  img.auto-preview.fav{ display:inline-block; width:16px; height:16px; border:0; padding:0; vertical-align:middle; }
  @media (max-width:680px){
    .page__content > ul > li{ flex-direction:column; gap:.55em; }
    .page__content > ul > li > .auto-preview-wrap{ flex-basis:auto; }
    .auto-preview-wrap img.auto-preview{ max-width:100%; max-height:none; }
    .page__title{ font-size:1.9em; }
  }

  /* home / archive contents list */
  .archive__item-title{ font-family:var(--display); font-weight:600; }
  .archive__item-title a{ text-decoration:none; }
  .archive__item-excerpt{ font-family:var(--serif); color:var(--muted); }
  .list__item{ border-bottom:1px solid var(--hair); padding-bottom:1em; margin-bottom:1em; }
  .archive__subtitle{ font-family:var(--sans); text-transform:uppercase; letter-spacing:.12em; font-size:.9em;
    color:var(--muted); border-bottom:1px solid var(--rule); }

  /* footer — small sans, recedes */

<script>
  // Strip the leading section-header emoji for a cleaner editorial look; the tracked kicker
  // styling carries the hierarchy. Only mutates the rendered page — source briefs are untouched.
  document.addEventListener('DOMContentLoaded', function () {
    var c = document.querySelector('.page__content'); if (!c) return;
    var LEAD = /^[\s←-⯿☀-➿\uD800-\uDFFF️‍]+/;
    c.querySelectorAll('h2, h3').forEach(function (h) {
      var n = h.firstChild;
      if (n && n.nodeType === 3) n.nodeValue = n.nodeValue.replace(LEAD, '');
    });
  });
</script>
